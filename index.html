<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公羊傳 Hypertext 註釋版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <p class="brand-kicker">Interactive Annotated Hypertext Edition</p>
        <h1>《公羊傳》互動註釋版</h1>
      </div>
      <div class="top-actions">
        <label class="search-wrap" for="searchInput">
          <span>檢索</span>
          <input id="searchInput" type="search" placeholder="詞條、正文或註釋內容">
        </label>
        <button id="newAnnotationBtn" class="ghost" type="button">新增註釋</button>
        <button id="editParagraphBtn" class="ghost" type="button">編輯正文</button>
        <button id="connectFileBtn" class="ghost" type="button">連接資料檔</button>
        <button id="syncFileBtn" class="ghost" type="button">同步到資料檔</button>
        <button id="reloadProjectBtn" class="ghost" type="button">重載專案 JSON</button>
        <button id="exportBtn" type="button">匯出 JSON</button>
        <button id="importBtn" type="button">匯入 JSON</button>
        <button id="resetBtn" class="danger" type="button">還原範例資料</button>
        <input id="importInput" type="file" accept="application/json" hidden>
      </div>
    </header>

    <p id="statusBar" class="status" aria-live="polite"></p>

    <main class="layout">
      <aside class="left-nav">
        <h2>篇章導航</h2>
        <p class="small">可拖曳章節調整順序</p>
        <nav id="sectionNav"></nav>
      </aside>

      <article class="reading-pane">
        <div class="reading-head">
          <h2>正文</h2>
          <p>點擊詞條可查看註釋，或直接在正文中選取文字後新增註釋。</p>
        </div>
        <div id="textRoot" class="text-root"></div>
        <div id="selectionToolbar" class="selection-toolbar" hidden>
          <button id="addSelectionAnnotationBtn" type="button">為選取文字新增註釋</button>
        </div>
      </article>

      <aside class="inspector">
        <div id="annotationPanel"></div>
      </aside>
    </main>
  </div>

  <script>
  window.addEventListener('error', function (event) {
    var bar = document.getElementById('statusBar');
    if (bar) {
      bar.textContent = 'JavaScript 錯誤：' + event.message + ' @ ' + (event.filename || '') + ':' + event.lineno;
      bar.classList.add('error');
    }
  });
  </script>
  <script src="app.js?v=20260407-8"></script>
</body>
</html>
